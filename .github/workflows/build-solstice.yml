name: Build Solstice (win32-x64 + darwin-arm64 + linux-x64)

# Manual trigger only — each full matrix run costs ~$6-8 on a private repo
# (Windows 2x + macOS 10x minute multipliers). Never build installers on the
# Linux server: native .node modules must compile on the target OS.
on:
  workflow_dispatch:
    inputs:
      build_windows:
        type: boolean
        default: true
        description: Build win32-x64 UserSetup + SystemSetup
      build_macos:
        type: boolean
        default: true
        description: Build darwin-arm64 zip+dmg
      build_linux:
        type: boolean
        default: true
        description: Build linux-x64 (server-side run + screenshots)
      publish:
        type: boolean
        default: false
        description: "Publish: create the GH Release + push OTA manifests (needs STRONGER_GITHUB_TOKEN + SSslider/versions). Off = artifacts only."
      release_version:
        type: string
        default: ""
        description: "Release version for publish, e.g. 0.5.0 (no leading v). Required when publish is on."

env:
  APP_NAME: Solstice
  BINARY_NAME: solstice
  GH_REPO_PATH: ${{ github.repository }}
  ASSETS_REPOSITORY: ${{ github.repository }}
  VERSIONS_REPOSITORY: ${{ github.repository_owner }}/versions
  ORG_NAME: ${{ github.repository_owner }}
  VSCODE_QUALITY: stable
  # OTA on: update patches stay off so updateUrl (product.json → SSslider/versions)
  # is honored. Auto-update is a no-op until the versions repo has manifests, so
  # an artifacts-only run (publish=false) is still safe.
  DISABLE_UPDATE: no
  SHOULD_BUILD: yes
  SHOULD_BUILD_REH: no
  SHOULD_BUILD_REH_WEB: no

# contents:write so the publish path can create the GH Release on this repo.
permissions:
  contents: write

jobs:
  windows:
    if: ${{ inputs.build_windows }}
    runs-on: windows-2022
    defaults:
      run:
        shell: bash
    env:
      OS_NAME: windows
      VSCODE_ARCH: x64
      # RELEASE_VERSION must be set before Build so version.sh derives the right
      # BUILD_SOURCEVERSION (the update manifest's `version`). Empty when not publishing.
      RELEASE_VERSION: ${{ inputs.release_version }}
      # CI_BUILD=no makes build.sh run the packaging gulp task + CLI build
      # in-process (upstream CI packages in a separate job we don't have).
      CI_BUILD: no
      SHOULD_BUILD_MSI: no
      SHOULD_BUILD_MSI_NOUP: no
      # SHOULD_BUILD_EXE_SYS defaults to yes — produces SolsticeSetup-x64-*.exe
      # (system-wide Inno Setup installer, requires admin — Antigravity-style)
      # alongside SolsticeUserSetup-x64-*.exe (per-user, no admin).
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Clone VSCode repo (pinned MS_TAG)
        run: ./get_repo.sh

      - name: Bundle codex binary (win32)
        run: bash scripts/bundle-codex-binary.sh win32

      # Signed Node runtime so the grok/Composer engine launches without the
      # Defender `spawn EPERM` block (winspawn prefers bin/node.exe over the
      # unsigned Solstice.exe self-relaunch). win32-only; no-op elsewhere.
      - name: Bundle node runtime (win32)
        run: bash scripts/bundle-node-binary.sh win32

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./build.sh

      # MANDATORY GATE — fails the job if any .node inside the output is not a
      # Windows PE binary (lesson: 4x false-positive cross-builds, 17-22/05).
      - name: Verify native modules match win32
        run: bash scripts/verify-build-target-natives.sh ./VSCode-win32-x64 win32

      - name: Prepare assets (installer + zip)
        run: ./prepare_assets.sh

      - uses: actions/upload-artifact@v7
        with:
          name: solstice-win32-x64
          path: assets/
          retention-days: 7

      # Publish path (opt-in): create/refresh the GH Release with the installers,
      # then push the OTA update manifests to SSslider/versions so installed
      # Solstice clients auto-update. Needs STRONGER_GITHUB_TOKEN (PAT with write
      # to the versions repo) + the versions repo to exist.
      - name: Publish GH Release (win32)
        if: ${{ inputs.publish }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./release.sh

      - name: Publish OTA manifests (win32)
        if: ${{ inputs.publish }}
        env:
          GITHUB_TOKEN: ${{ secrets.STRONGER_GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: ./update_version.sh

  macos:
    if: ${{ inputs.build_macos }}
    runs-on: macos-14 # GitHub-hosted Apple Silicon (real arm64)
    env:
      OS_NAME: osx
      VSCODE_ARCH: arm64
      RELEASE_VERSION: ${{ inputs.release_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Clone VSCode repo (pinned MS_TAG)
        run: ./get_repo.sh

      - name: Bundle codex binary (darwin)
        run: bash scripts/bundle-codex-binary.sh darwin

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./build.sh

      - name: Verify native modules match darwin
        run: bash scripts/verify-build-target-natives.sh ./VSCode-darwin-arm64 darwin

      # Ad-hoc signing is REQUIRED on Apple Silicon (kernel kills unsigned
      # arm64 code). Must be the LAST mutation of the .app before zipping.
      - name: Ad-hoc codesign
        run: codesign --force --deep -s - "./VSCode-darwin-arm64/${APP_NAME}.app"

      - name: Prepare assets (zip + dmg)
        run: ./prepare_assets.sh

      - uses: actions/upload-artifact@v7
        with:
          name: solstice-darwin-arm64
          path: assets/
          retention-days: 7

      - name: Publish GH Release (darwin)
        if: ${{ inputs.publish }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./release.sh

      - name: Publish OTA manifests (darwin)
        if: ${{ inputs.publish }}
        env:
          GITHUB_TOKEN: ${{ secrets.STRONGER_GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: ./update_version.sh

  linux:
    if: ${{ inputs.build_linux }}
    runs-on: ubuntu-22.04
    env:
      OS_NAME: linux
      VSCODE_ARCH: x64
      CI_BUILD: no
      # 7GB runner — 8192 heap OOMs the VM mid-bundle (twice: runs 27370768408-prior, 27380199425)
      SOLSTICE_NODE_HEAP: "5120"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build deps
        run: sudo apt-get update -y && sudo apt-get install -y libkrb5-dev

      - name: Clone VSCode repo (pinned MS_TAG)
        run: ./get_repo.sh

      - name: Bundle codex binary (linux)
        run: bash scripts/bundle-codex-binary.sh linux

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./build.sh

      - name: Verify native modules match linux
        run: bash scripts/verify-build-target-natives.sh ./VSCode-linux-x64 linux

      - name: Tarball app dir
        run: tar -czf solstice-linux-x64.tar.gz VSCode-linux-x64

      - uses: actions/upload-artifact@v7
        with:
          name: solstice-linux-x64
          path: solstice-linux-x64.tar.gz
          retention-days: 7
